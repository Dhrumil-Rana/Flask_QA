{% extends 'layout.html' %}

{% block css %}
    <link rel="stylesheet" type = "text/css" href="{{ url_for ('static' , filename='css/post.css') }}">
{% endblock %}

{% block content %}
    <h1 class="post">Create Post</h1>
*Still need to implement rich text so the buttons actually work*<br>
    <input type="radio" name="richtext" id="bold" value="Bold">Bold</input>
    <input type="radio" name="richtext" id="italics" value="Italics">Italics</input>
    <input type="radio" name="richtext" id="underline" value="Underline">Underline</input>
    <input type="radio" name="richtext" value="None">None</input>
    <form id="userpost" method="post" title="Post">
        <div class="postfield">
            <textarea rows="4" cols="80" name="usertext" wrap="hard" placeholder="Enter your thoughts here." form="userpost" maxlength="200"></textarea><br>
            <label for="img">Attach image:</label>
            <input type="file" id="img" name="img" accept=".png, .jpg, .jpeg"><br>
            <input type="submit" value="Post">
        </div><br>
    </form>
{% endblock %}
